name: "CI Assignment - Sona"

on:
  push:
    branches:
      - assignment-06-07-CI-CD-Sona-Arzumanyan

jobs: 
  build:
    runs-on: ubuntu-latest

    steps: 
       - name: Checkout code
         uses: actions/checkout@v3

       - name: Print greeting
         run: echo "Hello from Sona's CI/CD pipeline!!!!"

       - name: Print current date and time
         run: date

       - name: Print names of changed files between current and master branch
         run: |
            echo "Changed files compared to master"
            git fetch origin master
            git diff --name-only origin/master HEAD > changed_files.txt
            cat changed_files.txt

            if grep -q "SonaArzumanyan-ci.yml" changed_files.txt; then 
              echo "Success: Workflow file changed!"
            else 
              echo "Failure: Workflow file not changed!"
              exit 1
            fi
